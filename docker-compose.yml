services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"

  api:
    build: .
    env_file:
      - .env
    environment:
      - UPLOAD_DIR=/data/receipts
    depends_on:
      - db
    ports:
      - "8000:8000"
    volumes:
      - ./app:/app
      - ${RECEIPTS_HOST_PATH:-./data/receipts}:/data/receipts

  magicmirror:
    image: karsten13/magicmirror:latest
    depends_on:
      - api
    ports:
      - "8080:8080"
    volumes:
      - ./magicmirror/MMM-KitchenInventory:/opt/magic_mirror/modules/MMM-KitchenInventory
      - ./magicmirror/config:/opt/magic_mirror/config
    environment:
      - TZ=${TZ:-America/New_York}
    restart: unless-stopped

volumes:
  postgres_data: